backend:
  name: github
  repo: Erteo99/webturikaleprint
  branch: main
  client_id: Ov23li953DFR0757Q9M8

media_folder: "public/assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "artikel"
    label: "Artikel"
    folder: "content/artikel"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - { label: "Gambar", name: "image", widget: "image" }
      - { label: "Isi Artikel", name: "body", widget: "markdown" }

  - name: "logo"
    label: "Aset Logo"
    folder: "content/logo"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nama Logo", name: "title", widget: "string" }
      - { label: "Kategori", name: "category", widget: "string" }
      - { label: "File Logo", name: "image", widget: "image" }
